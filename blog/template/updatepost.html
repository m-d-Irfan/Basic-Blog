<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Post — The Chronicle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['DM Sans', 'sans-serif'] },
          colors: { navy: { 900: '#0d1b2a', 800: '#1b2a3b' } }
        }
      }
    }
  </script>
  <style>
    body { background: #faf8f4; }
    .form-input, .form-textarea, .form-select {
      display: block; width: 100%; padding: 0.875rem 1rem;
      border: 1.5px solid #e5e7eb; border-radius: 0.75rem;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      background: white; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-textarea { min-height: 220px; resize: vertical; }
    input:focus, textarea:focus, select:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
  </style>
</head>
<body class="font-sans">

  <nav class="bg-navy-900 px-6 py-4 flex items-center justify-between">
    <a href="/" class="flex items-center gap-2 text-gray-400 hover:text-amber-400 transition-colors text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Back
    </a>
    <span class="font-serif text-white font-bold">The <span class="text-amber-400">Chronicle</span></span>
    <div class="w-24"></div>
  </nav>

  <div class="max-w-2xl mx-auto px-6 py-12">
    <div class="mb-10">
      <p class="text-xs uppercase tracking-widest text-amber-500 font-medium mb-2">Editing</p>
      <h1 class="font-serif text-4xl font-bold text-navy-900">Update Post</h1>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 p-8 shadow-sm">
      <form method="POST" class="space-y-6">
        {% csrf_token %}
        {% for field in form %}
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1.5">{{ field.label }}</label>
            {{ field }}
            {% if field.help_text %}
              <p class="text-xs text-gray-400 mt-1">{{ field.help_text }}</p>
            {% endif %}
            {% if field.errors %}
              <p class="text-red-500 text-xs mt-1">{{ field.errors|join:", " }}</p>
            {% endif %}
          </div>
        {% endfor %}

        <div class="flex items-center gap-4 pt-2">
          <button type="submit" class="flex-1 bg-amber-400 hover:bg-amber-500 text-navy-900 font-semibold py-3.5 px-6 rounded-xl transition-colors">
            Save Changes
          </button>
          <a href="/" class="px-6 py-3.5 border border-gray-200 text-gray-500 hover:border-gray-400 hover:text-gray-700 rounded-xl text-sm font-medium transition-colors">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>

  <script>
    document.querySelectorAll('input[type=text], input[type=email]').forEach(el => el.classList.add('form-input'));
    document.querySelectorAll('textarea').forEach(el => el.classList.add('form-textarea'));
    document.querySelectorAll('select').forEach(el => el.classList.add('form-select'));
  </script>
</body>
</html>
