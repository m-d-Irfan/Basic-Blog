<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Posts — The Chronicle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['DM Sans', 'sans-serif'] },
          colors: { navy: { 900: '#0d1b2a', 800: '#1b2a3b' } }
        }
      }
    }
  </script>
  <style>
    body { background: #faf8f4; }
    .post-card { transition: transform 0.2s, box-shadow 0.2s; }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,27,42,0.1); }
  </style>
</head>
<body class="font-sans">

  <nav class="bg-navy-900 px-6 py-4 flex items-center justify-between">
    <a href="{% url 'cata_list' %}" class="flex items-center gap-2 text-gray-400 hover:text-amber-400 transition-colors text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      All Categories
    </a>
    <span class="font-serif text-white font-bold">The <span class="text-amber-400">Chronicle</span></span>
    <div class="w-28"></div>
  </nav>

  <div class="max-w-3xl mx-auto px-6 py-12">
    <div class="mb-10">
      <p class="text-xs uppercase tracking-widest text-amber-500 font-medium mb-2">Category</p>
      <h1 class="font-serif text-4xl font-bold text-navy-900">Posts</h1>
    </div>

    {% if posts %}
      <div class="grid gap-4">
        {% for post in posts %}
          <article class="post-card bg-white rounded-2xl border border-gray-100 p-6 flex items-start gap-5">
            <div class="flex-shrink-0 w-10 h-10 bg-amber-50 rounded-xl flex items-center justify-center">
              <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <div class="flex-1 min-w-0">
              <h2 class="font-serif text-xl font-bold text-navy-900 mb-1 leading-snug">{{ post.title }}</h2>
              <p class="text-sm text-gray-500 mb-3">by <span class="text-navy-800 font-medium">{{ post.author.username }}</span></p>
              <a href="{% url 'post_details' post.id %}" class="inline-flex items-center gap-1 text-amber-500 hover:text-amber-600 text-sm font-medium transition-colors">
                Read article
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </a>
            </div>
          </article>
        {% endfor %}
      </div>
    {% else %}
      <div class="text-center py-24 bg-white rounded-2xl border border-gray-100">
        <div class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-amber-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <p class="font-serif text-2xl text-gray-400 mb-2">No posts in this category</p>
        <a href="{% url 'cata_list' %}" class="text-amber-500 hover:text-amber-600 text-sm font-medium">← Browse categories</a>
      </div>
    {% endif %}
  </div>

</body>
</html>
