<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Posts — The Chronicle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { serif: ['Playfair Display', 'serif'], sans: ['DM Sans', 'sans-serif'] },
          colors: { navy: { 900: '#0d1b2a', 800: '#1b2a3b', 700: '#243447' } }
        }
      }
    }
  </script>
  <style>
    body { background: #faf8f4; }
    .post-card { transition: transform 0.2s, box-shadow 0.2s; }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(13,27,42,0.1); }
  </style>
</head>
<body class="font-sans">

  <nav class="bg-navy-900 px-6 py-4 flex items-center justify-between">
    <a href="{% url 'all_Post' %}" class="flex items-center gap-2 text-gray-400 hover:text-amber-400 transition-colors text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      All Posts
    </a>
    <span class="font-serif text-white font-bold">The <span class="text-amber-400">Chronicle</span></span>
    <a href="{% url 'add_post' %}" class="flex items-center gap-1.5 bg-amber-400 hover:bg-amber-500 text-navy-900 font-medium text-sm py-2 px-4 rounded-lg transition-colors">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
      New Post
    </a>
  </nav>

  <div class="max-w-3xl mx-auto px-6 py-12">
    <div class="mb-10">
      <p class="text-xs uppercase tracking-widest text-amber-500 font-medium mb-2">Dashboard</p>
      <h1 class="font-serif text-4xl font-bold text-navy-900">{{ user.username }}'s Posts</h1>
    </div>

    {% if posts %}
      <div class="grid gap-4">
        {% for post in posts %}
          <article class="post-card bg-white rounded-2xl border border-gray-100 p-6 flex items-start justify-between gap-4">
            <div class="flex-1 min-w-0">
              <h2 class="font-serif text-xl font-bold text-navy-900 mb-1 leading-snug">{{ post.title }}</h2>
              <a href="{% url 'post_details' post.id %}" class="inline-flex items-center gap-1 text-amber-500 hover:text-amber-600 text-sm font-medium transition-colors">
                Read
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </a>
            </div>
            {% if user == post.author %}
              <div class="flex items-center gap-2 flex-shrink-0">
                <a href="{% url 'update_post' post.id %}" class="flex items-center gap-1.5 text-xs font-medium text-gray-500 hover:text-navy-900 border border-gray-200 hover:border-gray-400 px-3 py-2 rounded-lg transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                  Edit
                </a>
                <a href="{% url 'delete_post' post.id %}" class="flex items-center gap-1.5 text-xs font-medium text-red-400 hover:text-red-600 border border-red-100 hover:border-red-300 px-3 py-2 rounded-lg transition-colors">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  Delete
                </a>
              </div>
            {% endif %}
          </article>
        {% endfor %}
      </div>
    {% else %}
      <div class="text-center py-24 bg-white rounded-2xl border border-gray-100">
        <div class="w-16 h-16 bg-amber-50 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-amber-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </div>
        <p class="font-serif text-2xl text-gray-400 mb-3">No posts yet</p>
        <a href="{% url 'add_post' %}" class="inline-flex items-center gap-2 bg-amber-400 hover:bg-amber-500 text-navy-900 font-medium text-sm py-2.5 px-5 rounded-xl transition-colors">
          Write your first post →
        </a>
      </div>
    {% endif %}
  </div>

</body>
</html>
